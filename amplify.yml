version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
        - env | grep -E '^(DATABASE_URL|AUTH_SECRET|S3_UPLOAD_BUCKET|S3_REGION|NEXT_PUBLIC_BASE_URL)=' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
      - '.next/cache/**/*'
